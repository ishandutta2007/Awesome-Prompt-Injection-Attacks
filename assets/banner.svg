<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0f0c24" />
      <stop offset="100%" stop-color="#05020c" />
    </linearGradient>

    <!-- Glowing Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .pulse {
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }
    .float {
      animation: floatEffect 6s ease-in-out infinite;
    }
    .wave {
      animation: waveMotion 10s linear infinite;
    }
    @keyframes pulseGlow {
      0% { opacity: 0.3; }
      100% { opacity: 0.8; }
    }
    @keyframes floatEffect {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    @keyframes waveMotion {
      0% { transform: translateX(0px); }
      100% { transform: translateX(-80px); }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Dynamic Glowing Cyber Wave/Grid Line -->
  <g opacity="0.6">
    <path class="wave" d="M-100,250 Q150,180 400,250 T900,250 T1400,250" fill="none" stroke="#7f00ff" stroke-width="4" filter="url(#glow)" />
    <path class="wave" d="M-100,270 Q150,220 400,270 T900,270 T1400,270" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow)" opacity="0.8" />
  </g>

  <!-- Decorative circles / floating nodes -->
  <circle cx="200" cy="100" r="40" fill="#ff007f" opacity="0.15" class="pulse" filter="url(#glow)" />
  <circle cx="1000" cy="300" r="60" fill="#00f0ff" opacity="0.1" class="pulse" filter="url(#glow)" />

  <!-- Title Text -->
  <g transform="translate(600, 180)" text-anchor="middle" class="float">
    <text font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="58" font-weight="900" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="4">
      PROMPT INJECTION ATTACKS
    </text>
  </g>

  <!-- Subtitle Text -->
  <g transform="translate(600, 240)" text-anchor="middle">
    <text font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#a0aec0" letter-spacing="8">
      HISTORY, PROGRESSION, VARIANTS &amp; APPLICATIONS
    </text>
  </g>

  <!-- Cyber frame corner decoration -->
  <path d="M 20 50 L 20 20 L 50 20" stroke="#00f0ff" stroke-width="3" fill="none" />
  <path d="M 1180 50 L 1180 20 L 1150 20" stroke="#00f0ff" stroke-width="3" fill="none" />
  <path d="M 20 350 L 20 380 L 50 380" stroke="#00f0ff" stroke-width="3" fill="none" />
  <path d="M 1180 350 L 1180 380 L 1150 380" stroke="#00f0ff" stroke-width="3" fill="none" />
</svg>
